# theme.conf
# Dark Theme Configuration for the Unified Desktop Environment (UDE)

# General theme settings
theme_name = "Dark Theme"
theme_description = "A dark theme designed for use in low-light environments."

# Background color for the desktop
desktop_background_color = "#263238"
desktop_background_image = "/path/to/dark-theme-wallpaper.jpg"

# Taskbar color and settings
taskbar_color = "#37474F"  # Dark grey-blue
taskbar_opacity = 0.85

# Window borders and buttons
window_border_color = "#455A64"  # Darker grey-blue
window_button_color = "#CFD8DC"  # Light grey

# Icon set
icon_set = "dark-icons"
icon_directory = "/path/to/dark-theme-icons/"
