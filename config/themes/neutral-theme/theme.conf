# theme.conf
# Neutral Theme Configuration for the Unified Desktop Environment (UDE)

# General theme settings
theme_name = "Neutral Theme"
theme_description = "A balanced theme with neutral colors, great for most times of the day."

# Background color for the desktop
desktop_background_color = "#B0BEC5"
desktop_background_image = "/path/to/neutral-theme-wallpaper.jpg"

# Taskbar color and settings
taskbar_color = "#607D8B"  # Neutral grey-blue
taskbar_opacity = 0.9

# Window borders and buttons
window_border_color = "#CFD8DC"  # Light grey
window_button_color = "#B0BEC5"

# Icon set
icon_set = "neutral-icons"
icon_directory = "/path/to/neutral-theme-icons/"
