# ude-config_sample.conf
# Sample configuration file for UDE

[general]
default_theme = "light-theme"
enable_time_based_theme_switch = true

[taskbar]
color = "#FFEB3B"
orientation = "bottom"
icon_placement = "center"
hiding_enabled = true
hiding_timeout = 2

[desktop]
background_color = "#FFFFFF"
background_image = "/path/to/wallpaper.jpg"
icon_placement = "auto"
icon_hiding_enabled = true
icon_hiding_timeout
